name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}
          BASE: /cesium-3d-spatial-analysis/
        run: npm run build

      # vite-plugin-cesium 在自定义 base 时不复制 Cesium 静态文件，
      # 需手动从 node_modules 复制（显式指定小写 cesium 目录名，
      # 与 vite-plugin-cesium transformIndexHtml 注入的 URL 路径一致，
      # 否则 Linux 区分大小写会导致 404）
      - name: Copy Cesium static files
        run: cp -r node_modules/cesium/Build/Cesium dist/cesium

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
